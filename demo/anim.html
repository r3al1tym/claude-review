<!doctype html>
<html lang="en"><head><meta charset="utf-8">
<title>claude-review demo</title>
<style>
@font-face{font-family:JBM;src:url(jbm-Regular.woff2) format("woff2");font-weight:400;font-style:normal;font-display:block}
@font-face{font-family:JBM;src:url(jbm-Bold.woff2) format("woff2");font-weight:700;font-style:normal;font-display:block}
@font-face{font-family:JBM;src:url(jbm-Italic.woff2) format("woff2");font-weight:400;font-style:italic;font-display:block}
:root{
  --term:#15140f;            /* one terminal bg, both panes (tmux split) */
  --content:#ece9e1;         /* full-bright answer text */
  --g85:#d8d6cf; --g70:#b1aea5; --g62:#9b978d; --g50:#7f7b71; --g37:#5d5a52; --g27:#46433d;
  --sep:#7d776a;             /* the vertical pane separator — bright enough to survive GIF palette quantization */
  --cyan:#46d4d4;            /* the ONE colour — frozen only */
  --cc-dot:#6f9f6f;          /* claude-code tool bullet (muted green) */
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{background:#070707;
  font-family:JBM,"DejaVu Sans Mono",monospace;
  font-variant-emoji:text}                 /* never substitute colour-emoji glyphs */
.wrap{width:1010px;margin:14px auto}
.frame{border-radius:11px;overflow:hidden;background:var(--term);
  box-shadow:0 26px 70px -14px rgba(0,0,0,.75),0 0 0 1px rgba(255,255,255,.045)}

/* ---- title bar: traffic lights + a per-pane centered title on each side ---- */
.bar{height:34px;background:#211f1a;display:flex;position:relative}
.lights{position:absolute;left:13px;top:0;height:34px;display:flex;align-items:center;gap:8px;z-index:2}
.lights i{width:11px;height:11px;border-radius:50%}
.lights .r{background:#f25f57}.lights .y{background:#fbbe2e}.lights .g{background:#28c93f}
.btitle{display:flex;align-items:center;justify-content:center;overflow:hidden;
  white-space:nowrap;min-width:0;color:var(--g50);font-size:12px}
.btitle b{color:var(--g70);font-weight:500}
.btdiv{width:2px;background:var(--sep)}   /* continues the pane separator up through the bar */

.split{display:flex;height:592px}
.pane{flex:1;min-width:0;overflow:hidden;position:relative;font-size:12.5px;line-height:1.6}
.vdiv{width:2px;background:var(--sep)}     /* the vertical separator between the two panes (2px so GIF dithering can't erase it) */

/* ---------- LEFT : Claude Code, busy back-and-forth ---------- */
.cc{display:flex;flex-direction:column}
.cc .scroll{flex:1;overflow:hidden;padding:14px 16px 0;
  -webkit-mask-image:linear-gradient(180deg,transparent 0,#000 56px);
  mask-image:linear-gradient(180deg,transparent 0,#000 56px)}
.cc .e{white-space:pre-wrap;margin:1px 0}
.cc .u{color:var(--g85)}
.cc .u .c{color:var(--cc-dot)}
.cc .tool{color:var(--g62)}
.cc .tool .d{color:var(--cc-dot)}
.cc .res{color:var(--g37)}
.cc .think{color:var(--g50);font-style:italic}
.cc .a{color:var(--content);margin:3px 0 7px}
.cc .a b,.cc .a strong{font-weight:700}
.cc .a .bul{padding-left:14px;text-indent:-14px}
/* Claude Code's own render of the answer: H1 bold+underline+centered, H3 bold,
   and a FULL-BORDER monochrome table (no colour) — distinct from the review pane */
.cc .review .h1{font-weight:700;color:#fff;text-align:left;margin:3px 0}
.cc .review .h3{font-weight:700;color:#fff;margin:11px 0 0}
.cc .review p{margin:9px 0 0}
.cc .review p .hl{font-weight:700;color:#fff}
.cc .review table.box{border-collapse:collapse;margin:11px 0 0;color:var(--content)}
.cc .review table.box th,.cc .review table.box td{border:1px solid var(--g50);padding:1px 10px;text-align:left}
.cc .review table.box th{font-weight:700}
.cc .review .li{margin:4px 0 0}
.cc .inp{margin:8px 14px 12px;border:1px solid var(--g27);border-radius:7px;
  padding:7px 11px;color:var(--g70);white-space:pre-wrap;min-height:33px}
.cc .inp .cur{display:inline-block;width:7px;height:14px;background:var(--g70);
  transform:translateY(2px)}
.cc .meta{padding:0 16px 8px;color:var(--g37);font-size:11px}

/* ---------- RIGHT : the new pane — shell first, then claude-review ---------- */
.cr{display:flex;flex-direction:column;color:var(--content)}
/* shell phase: the user has just split the terminal and types the command */
.cr .sh{padding:15px 16px 0;color:var(--g85)}
.cr .sh .shln{white-space:pre-wrap;margin:1px 0}
.cr .sh .p{color:var(--cc-dot)}
.cr .sh .dim{color:var(--g50)}
.cr .sh .cur{display:inline-block;width:7px;height:14px;background:var(--g85);transform:translateY(2px)}
/* claude-review TUI */
.cr .rule{display:flex;align-items:center;gap:8px;padding:0 15px;color:var(--g27)}
.cr .rule .ln{flex:1;border-top:1px solid var(--g27)}
.cr .badge{color:var(--g70);background:var(--g27);border-radius:3px;padding:1px 8px;font-size:12px}
.cr .body{flex:1;overflow:hidden;padding:15px 18px 0 30px}
/* claude-review markdown: H1 bold+underline+CENTERED, H3 bold; borderless teal table */
.cr .h1{font-size:13px;font-weight:700;text-decoration:underline;text-underline-offset:3px;color:#fff;text-align:center;margin:0}
.cr .h3{font-weight:700;color:#fff;margin:20px 0 0}
.cr p{margin:13px 0 0;max-width:66ch}
.cr p .hl{font-weight:700;color:#fff}
.cr .tbl{display:grid;grid-template-columns:auto auto 1fr;column-gap:26px;row-gap:2px;margin:17px 0 0;max-width:70ch}
.cr .tbl .th{font-weight:700;color:#8fb6b6;border-bottom:1px solid var(--g27);padding-bottom:3px;margin-bottom:3px}
.cr .li{margin:7px 0 0;color:var(--content)}
.cr .cur{display:inline-block;width:7px;height:14px;background:var(--content);transform:translateY(2px);margin-left:1px}
.cr .working{color:var(--g50);font-style:italic}
.cr .foot{padding:0 15px 13px}
.cr .keys{display:flex;justify-content:space-between;gap:16px;white-space:nowrap;
  padding:8px 16px 0;color:var(--g37);font-size:10px;letter-spacing:-.1px}
.cr .keys>span{white-space:pre}
.cr .dot{color:var(--g37)} .cr .sid{color:var(--g37)}
.cr .tabon{color:var(--g85);text-decoration:underline;text-underline-offset:3px}
.cr.frozen .dot{color:var(--cyan)} .cr.frozen .state{color:var(--cyan)}
.cr .newhint{color:var(--cyan)}
/* freeze keycap — flashes when `f` toggles freeze on */
.cr .keycap{position:absolute;right:18px;bottom:46px;background:var(--cyan);color:#08201f;
  font-size:12px;border-radius:6px;padding:3px 9px;
  box-shadow:0 0 0 2px rgba(70,212,212,.30),0 8px 22px rgba(0,0,0,.55)}
.cr .keycap b{font-weight:700}
.cr .keycap small{font-weight:400;opacity:.75;margin-left:3px}
</style></head>
<body>
<div class="wrap"><div class="frame">
  <div class="bar">
    <div class="lights"><i class="r"></i><i class="y"></i><i class="g"></i></div>
    <div class="btitle" id="btLeft"><b>claude</b></div>
    <div class="btdiv" id="btDiv"></div>
    <div class="btitle" id="btRight"></div>
  </div>
  <div class="split">
    <div class="pane cc" id="ccPane"><div class="scroll" id="ccScroll"></div>
      <div class="inp" id="ccInp"></div>
      <div class="meta">claude-opus-4-8 · ⏎ send</div>
    </div>
    <div class="vdiv" id="vdiv"></div>
    <div class="pane cr" id="cr"></div>
  </div>
</div></div>

<script>
// ---- deterministic timeline (seconds) ----
// The full story, faithful to how you'd actually reach for claude-review:
//   0.0  a Claude Code session, single full-width pane, already mid-work
//   1.3  you SPLIT the terminal — a second pane slides smoothly in (eased) from the right
//   2.0  you type `claude-review` in the new pane and hit enter
//   3.8  it attaches to the newest session and pins its LATEST response
//   4.6  back on the left you ask a fresh question; the pane resets to the top,
//        shows a real "working" placeholder, then renders the whole answer at once
//  10.1  you press `f` — FREEZE holds your read while Claude keeps working left
// The review pane re-renders the WHOLE current turn on file change; it never
// typewriters. Freeze is the one moment colour enters (cyan).
var T={
  splitT:1.3,        // terminal splits; right pane begins its slide-in
  slideDur:0.65,     // eased slide-in duration
  cmdStart:2.0,      // start typing `claude-review` (after the pane has settled)
  cmdEnter:3.2,      // command submitted
  attachedT:3.8,     // attached → shows the pinned latest response
  askStart:4.6,      // start typing the new prompt on the LEFT
  askT:5.9,          // new prompt submitted
  answerT:8.3,       // the review renders (both panes)
  freezeT:10.1,      // freeze toggled ON (highlighted)
  buryAskT:10.3,     // left moves on
  endT:13.9
};
var NEW_PROMPT="give me the full cutover review — go / no-go, with risks and blockers";
var CMD="claude-review";

// ---- THE REVIEW ----
// One shared markdown render. BOTH panes show this EXACT content — Claude Code
// renders the full answer too. The only difference the demo makes is context:
// on the left it's wrapped in tool noise and scrolled past; on the right it's
// isolated, pinned, and shown from the top. Never truncate it on the left.
// Rows shared by both panes' tables (content is identical; only the table CHROME
// differs per renderer — Claude Code = full box borders, no colour; claude-review
// = borderless, teal headers + one rule).
var ROWS=[
 ['Session-store cutover','high','rollback rehearsal — none yet'],
 ['Token format change','high','dual-read shim — not built'],
 ['Rate limiter','med','load test at 2× peak'],
 ['Connection pool','med','raise ceiling + monitor'],
 ['Cache warmup','low','prewarm script — done']
];
var HEAD=['Risk','Severity','Mitigation'];

// claude-review's H1 is bold+underline+CENTERED; H2/H3 bold; H4 bold-italic.
// The review's title is an H1 so it gets the underline; "Blocking…" is an H3.
function review(side){               // side: 'cc' (Claude Code) or 'cr' (claude-review)
  var t = (side==='cr') ? crTable() : ccTable();
  return ''+
   '<div class="h1">Cutover review — go / no-go</div>'+
   '<p><span class="hl">Recommendation: hold.</span> Two of five risks are unmitigated and the data-layer cutover has no tested rollback path. The plan moves auth first (backward-safe), then the data layer, then the rate limiter — but the middle phase is the one that can take down sessions, and we have no way to reverse it once it starts.</p>'+
   '<p>The token format change compounds this: old and new sessions can\'t coexist, so a partial cutover locks out anyone mid-session. Clear the two blockers below and this becomes a go; everything else can ship behind a feature flag and be tuned in production.</p>'+
   t+
   '<div class="h3">Why hold</div>'+
   '<p>A rollback rehearsal is the single highest-leverage thing here — without it, the data-layer cutover is a one-way door. The dual-read shim turns the token change from a hard cutover into a gradual migration, removing the lockout risk entirely.</p>'+
   '<div class="h3">Blocking before production</div>'+
   '<div class="li">- [ ] rehearse session-store rollback on staging</div>'+
   '<div class="li">- [ ] ship the dual-read token shim</div>'+
   '<p>Everything else can land behind a feature flag.</p>';
}
// claude-review: borderless grid, teal headers, single underline rule
function crTable(){
  var h='<div class="tbl">'+HEAD.map(function(c){return '<span class="th">'+c+'</span>';}).join('');
  ROWS.forEach(function(r){ h+=r.map(function(c){return '<span>'+c+'</span>';}).join(''); });
  return h+'</div>';
}
// Claude Code: full box borders, monochrome
function ccTable(){
  var h='<table class="box"><thead><tr>'+HEAD.map(function(c){return '<th>'+c+'</th>';}).join('')+'</tr></thead><tbody>';
  ROWS.forEach(function(r){ h+='<tr>'+r.map(function(c){return '<td>'+c+'</td>';}).join('')+'</tr>'; });
  return h+'</tbody></table>';
}
var REVIEW=review('cr');             // right pane uses the claude-review render

// previous (shorter) turn shown before the new ask — this is the LATEST response
// at attach time, and it matches the bottom of the left transcript.
var PREV='<div class="h1">Data-layer risks</div><p>Two stand out before cutover:</p>'+
 '<div class="li">- [ ] no rollback rehearsal</div>'+
 '<div class="li">- [ ] token format not backward-compatible</div>';

var WORKING='<div class="working">(no response yet — Claude is working)</div>';

// ---- LEFT transcript events (appear<0 = always present history) ----
var L=[
 {a:-1, h:'<div class="e u"><span class="c">❯</span> walk me through migration-plan.md</div>'},
 {a:-1, h:'<div class="e tool"><span class="d">●</span> Read(migration-plan.md)</div><div class="e res">  └─ Read 214 lines</div>'},
 {a:-1, h:'<div class="a">Three phases — <b>auth</b>, <b>data layer</b>, <b>rate limiter</b>. Auth is backward-safe; the data layer is the one to watch.</div>'},
 {a:-1, h:'<div class="e u"><span class="c">❯</span> what are the risks in the data-layer phase?</div>'},
 {a:-1, h:'<div class="e tool"><span class="d">●</span> Grep("rollback", src/)</div><div class="e res">  └─ 3 matches</div>'},
 {a:-1, h:'<div class="e tool"><span class="d">●</span> Read(data-layer/cutover.ts)</div><div class="e res">  └─ Read 180 lines</div>'},
 {a:-1, h:'<div class="a">Two stand out:<div class="bul">• no rollback rehearsal</div><div class="bul">• token format <b>not</b> backward-compatible</div></div>'},
 // new ask (typed into the input box during askStart..askT, then lands here)
 {a:T.askT, h:'<div class="e u"><span class="c">❯</span> '+NEW_PROMPT+'</div>'},
 {a:6.2, h:'<div class="e tool"><span class="d">●</span> Read(migration-plan.md)</div>'},
 {a:6.6, h:'<div class="e tool"><span class="d">●</span> Grep("rollback|rehearsal", src/)</div><div class="e res">  └─ 7 matches across 5 files</div>'},
 {a:7.1, h:'<div class="e tool"><span class="d">●</span> Read(auth/session-store.ts)</div><div class="e res">  └─ Read 318 lines</div>'},
 {a:7.6, h:'<div class="e think">✻ Thinking… weighing severity vs. blast radius…</div>'},
 {a:8.0, h:'<div class="e tool"><span class="d">●</span> Read(data-layer/cutover.ts)</div>'},
 // the SAME content renders on the left too (Claude Code's own box-bordered
 // table) — then gets buried by what follows
 {a:T.answerT, h:'<div class="a review">'+review('cc')+'</div>'},
 {a:9.1, h:'<div class="e tool"><span class="d">●</span> Read(config/rate-limits.ts)</div><div class="e res">  └─ Read 64 lines</div>'},
 // after freeze the left keeps moving — the whole point of freezing the right
 {a:T.buryAskT, h:'<div class="e u"><span class="c">❯</span> ok — which one is riskiest to ship first?</div>'},
 {a:10.8, h:'<div class="e tool"><span class="d">●</span> Read(rate-limiter.ts)</div><div class="e res">  └─ Read 92 lines</div>'},
 {a:11.4, h:'<div class="e think">✻ Thinking… the data-layer cutover has the widest blast radius…</div>'},
 {a:12.0, h:'<div class="e tool"><span class="d">●</span> Grep("rateLimit", src/)</div><div class="e res">  └─ 12 matches</div>'},
 {a:12.6, h:'<div class="e tool"><span class="d">●</span> Read(config/limits.ts)</div>'},
 {a:13.2, h:'<div class="e think">✻ Thinking…</div>'}
];

function clamp(x,a,b){return x<a?a:(x>b?b:x);}
function blink(t){return Math.floor(t*1.6)%2===0;}
function easeInOut(x){return x<0.5 ? 4*x*x*x : 1-Math.pow(-2*x+2,3)/2;}

// The shell the user sees right after splitting: a prompt, the typed command,
// then a one-line attach notice before the TUI takes over.
function shellView(t){
  var typing = (t>=T.cmdStart && t<T.cmdEnter);
  var full   = (t>=T.cmdEnter);
  var shown  = full ? CMD
             : typing ? CMD.slice(0, Math.floor(clamp((t-T.cmdStart)/(T.cmdEnter-T.cmdStart),0,1)*CMD.length))
             : '';
  var cur = (t<T.cmdEnter && blink(t)) ? '<span class="cur"></span>' : '';
  var h='<div class="sh"><div class="shln"><span class="p">❯</span> '+shown+cur+'</div>';
  if(full) h+='<div class="shln dim">  ⋯ attaching to 7dab670a — newest session</div>';
  h+='</div>';
  return h;
}

// The claude-review TUI: idle (prior turn) → working → the complete review, then frozen.
function tuiView(t,cr){
  var frozen  = (t>=T.freezeT);
  var idle    = (t<T.askT);
  var working = (t>=T.askT && t<T.answerT);
  cr.className='pane cr'+(frozen?' frozen':'');
  var bodyHtml = idle?PREV:(working?WORKING:REVIEW);

  var dot   = frozen?'■':(idle?'○':'●');
  var state = frozen?'frozen':(idle?'idle':'working');
  while(state.length<7) state+=' ';        // pad to 7 (working=longest) so the id never shifts
  var hint  = frozen ? '   <span class="newhint">new ↓</span>' : '';
  var left  = '<span><span class="dot">'+dot+'</span> <span class="state">'+state+'</span>  ·  <span class="sid">7dab670a</span>'+hint+'</span>';
  var fkey  = frozen?'f unfreeze':'f freeze';
  var keystr= fkey+' · ↑↓ scroll'+(frozen?'':' · s switch')+' · q quit';

  // freeze keycap flash — a quick cyan `f` press when freeze toggles on
  var kc='';
  if(t>=T.freezeT && t<T.freezeT+1.15){
    var kp=(t-T.freezeT)/1.15;
    var op=clamp(kp<0.10?kp/0.10:(1-(kp-0.10)/0.90),0,1);
    kc='<div class="keycap" style="opacity:'+op.toFixed(3)+'"><b>f</b><small>freeze on</small></div>';
  }
  return '<div class="rule"><span class="badge">claude review</span><span class="ln"></span></div>'+
    '<div class="body">'+bodyHtml+'</div>'+
    '<div class="foot"><div class="rule"><span class="ln"></span></div>'+
    '<div class="keys">'+left+'<span>'+keystr+'</span></div></div>'+kc;
}

function renderRight(t){
  var cr=document.getElementById('cr'), left=document.getElementById('ccPane'), vd=document.getElementById('vdiv'),
      btL=document.getElementById('btLeft'), btR=document.getElementById('btRight'), btD=document.getElementById('btDiv');

  // eased split geometry: the right pane slides smoothly in from the right
  var sp = easeInOut(clamp((t-T.splitT)/T.slideDur,0,1));
  var lf=100-50*sp, rf=50*sp, showR = sp>0.02;
  left.style.flex ='0 0 '+lf+'%';
  cr.style.flex   ='0 0 '+rf+'%';
  cr.style.transform='translateX('+((1-sp)*30).toFixed(1)+'px)';  // slide in from the right edge
  cr.style.opacity  =clamp(sp*1.6,0,1).toFixed(3);
  cr.style.display  = showR?'flex':'none';
  vd.style.display  = showR?'block':'none';

  // title bars: each title centered over ITS pane (tracks the split ratio); the
  // bar divider lines up with the pane separator so it reads as one line.
  btL.style.flex='1 1 '+lf+'%';
  btR.style.flex='1 1 '+rf+'%';
  btR.style.display = showR?'flex':'none';
  btD.style.display = showR?'block':'none';
  btR.innerHTML = (t<T.attachedT) ? 'zsh' : '<b>claude-review</b>';

  if(t<T.splitT){ cr.innerHTML=''; return; }
  if(t<T.attachedT){ cr.className='pane cr'; cr.innerHTML=shellView(t); return; }
  cr.innerHTML=tuiView(t,cr);
}

function renderLeft(t){
  var sc=document.getElementById('ccScroll'), inp=document.getElementById('ccInp');
  var html='';
  for(var i=0;i<L.length;i++){ if(L[i].a<=t) html+=L[i].h; }
  sc.innerHTML=html; sc.scrollTop=sc.scrollHeight;     // auto-scroll to newest
  // type the new prompt into the input box before submit (after attach)
  if(t>=T.askStart && t<T.askT){
    var f=clamp((t-T.askStart)/(T.askT-T.askStart),0,1);
    var n=Math.floor(f*NEW_PROMPT.length);
    inp.innerHTML=NEW_PROMPT.slice(0,n)+(blink(t)?'<span class="cur"></span>':'');
  } else {
    inp.innerHTML='<span class="cur"></span>';
  }
}

function seek(t){ renderLeft(t); renderRight(t); }
var q=new URLSearchParams(location.search);
var t=parseFloat(q.get('t')); if(isNaN(t)) t=6.0;
window.__T=T;
document.fonts.ready.then(function(){ seek(t); document.body.setAttribute('data-ready','1'); });
seek(t);
</script>
</body></html>
